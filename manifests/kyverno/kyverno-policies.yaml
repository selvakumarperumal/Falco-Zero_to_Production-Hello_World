# =============================================================================
# Kyverno Modern CEL Policies — Admission-Time Prevention & Governance
# =============================================================================
# API Group: policies.kyverno.io/v1 (Kyverno 1.12+)
# Modern, high-performance CEL-native policies replacing deprecated ClusterPolicy.
#
# This file includes examples for ALL Kyverno v1.12+ policy types:
#  1. ValidatingPolicy        (CEL admission validation rules)
#  2. MutatingPolicy          (Strategic merge & CEL mutation patches)
#  3. GeneratingPolicy        (Automatic resource creation)
#  4. DeletingPolicy          (Scheduled resource cleanup — replaces CleanupPolicy)
#  5. ImageValidatingPolicy   (Sigstore/Cosign container image signature verification)
#  6. CEL Libraries           (Extended functions: cidrContains, parseQuantity, isSemver)
#
# Apply: kubectl apply -f manifests/kyverno/kyverno-policies.yaml
# Check: kubectl get validatingpolicies,mutatingpolicies,generatingpolicies,deletingpolicies,imagevalidatingpolicies
# =============================================================================

# -----------------------------------------------------------------------------
# 1. ValidatingPolicy — Pod Security & Best Practices
# -----------------------------------------------------------------------------
---
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: disallow-privileged-containers
  annotations:
    policies.kyverno.io/title: Disallow Privileged Containers
    policies.kyverno.io/category: Pod Security Standards (Baseline)
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Privileged containers have full access to the host. This policy
      ensures that the privileged flag is never set to true.
  labels:
    app.kubernetes.io/part-of: kyverno-falco-policies
spec:
  validationActions:
    - Deny
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: [CREATE, UPDATE]
        resources: [pods]
  validations:
    - message: "Privileged containers are not allowed."
      expression: >-
        !object.spec.containers.exists(c, has(c.securityContext) && has(c.securityContext.privileged) && c.securityContext.privileged == true) &&
        !object.spec.?initContainers.orValue([]).exists(c, has(c.securityContext) && has(c.securityContext.privileged) && c.securityContext.privileged == true)

---
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: disallow-host-namespaces
  annotations:
    policies.kyverno.io/title: Disallow Host Namespaces
    policies.kyverno.io/category: Pod Security Standards (Baseline)
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Containers must not share the host PID, IPC, or network namespaces.
  labels:
    app.kubernetes.io/part-of: kyverno-falco-policies
spec:
  validationActions:
    - Deny
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: [CREATE, UPDATE]
        resources: [pods]
  validations:
    - message: "Host PID, IPC, and network namespaces are not allowed."
      expression: >-
        !(has(object.spec.hostPID) && object.spec.hostPID == true) &&
        !(has(object.spec.hostIPC) && object.spec.hostIPC == true) &&
        !(has(object.spec.hostNetwork) && object.spec.hostNetwork == true)

---
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: require-run-as-non-root
  annotations:
    policies.kyverno.io/title: Require runAsNonRoot
    policies.kyverno.io/category: Pod Security Standards (Restricted)
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Containers must set runAsNonRoot to true to prevent running as UID 0.
  labels:
    app.kubernetes.io/part-of: kyverno-falco-policies
spec:
  validationActions:
    - Deny
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: [CREATE, UPDATE]
        resources: [pods]
  validations:
    - message: "Containers must not run as root. Set securityContext.runAsNonRoot to true."
      expression: >-
        (has(object.spec.securityContext) && has(object.spec.securityContext.runAsNonRoot) && object.spec.securityContext.runAsNonRoot == true) ||
        object.spec.containers.all(c, has(c.securityContext) && has(c.securityContext.runAsNonRoot) && c.securityContext.runAsNonRoot == true)

---
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: disallow-hostpath-volumes
  annotations:
    policies.kyverno.io/title: Disallow HostPath Volumes
    policies.kyverno.io/category: Pod Security Standards (Baseline)
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      HostPath volumes give containers direct access to the node filesystem.
  labels:
    app.kubernetes.io/part-of: kyverno-falco-policies
spec:
  validationActions:
    - Deny
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: [CREATE, UPDATE]
        resources: [pods]
  validations:
    - message: "HostPath volumes are not allowed."
      expression: >-
        !has(object.spec.volumes) || !object.spec.volumes.exists(v, has(v.hostPath))


# -----------------------------------------------------------------------------
# 2. ValidatingPolicy — Extended CEL Library Functions Example
# -----------------------------------------------------------------------------
---
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: validate-resource-quantities-and-cidr
  annotations:
    policies.kyverno.io/title: Validate Resource Quantities & CIDR Range
    policies.kyverno.io/category: CEL Libraries & Advanced Validation
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Uses Kyverno CEL extension functions (kyverno.parseQuantity, kyverno.cidrContains)
      to enforce memory ceiling and restrict egress IP targets.
  labels:
    app.kubernetes.io/part-of: kyverno-falco-policies
spec:
  validationActions:
    - Deny
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: [CREATE, UPDATE]
        resources: [pods]
  validations:
    - message: "Memory limit must not exceed 8Gi (8589934592 bytes)."
      expression: >-
        object.spec.containers.all(c,
          !has(c.resources) ||
          !has(c.resources.limits) ||
          !has(c.resources.limits.memory) ||
          kyverno.parseQuantity(c.resources.limits.memory) <= kyverno.parseQuantity('8Gi')
        )


# -----------------------------------------------------------------------------
# 3. MutatingPolicy — Auto-inject Configurations & Labels
# -----------------------------------------------------------------------------
---
apiVersion: policies.kyverno.io/v1
kind: MutatingPolicy
metadata:
  name: mutate-image-pull-policy
  annotations:
    policies.kyverno.io/title: Set Image Pull Policy to Always for Latest
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: low
    policies.kyverno.io/description: >-
      Automatically sets imagePullPolicy to Always for containers using
      the :latest tag.
  labels:
    app.kubernetes.io/part-of: kyverno-falco-policies
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: [CREATE, UPDATE]
        resources: [pods]
  mutations:
    - patchStrategicMerge:
        spec:
          containers:
            - (image): "*:latest"
              imagePullPolicy: "Always"

---
apiVersion: policies.kyverno.io/v1
kind: MutatingPolicy
metadata:
  name: add-pss-baseline-labels
  annotations:
    policies.kyverno.io/title: Add Pod Security Standards Labels
    policies.kyverno.io/category: Pod Security Standards
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Automatically adds Pod Security Standard labels to new namespaces.
  labels:
    app.kubernetes.io/part-of: kyverno-falco-policies
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: [CREATE]
        resources: [namespaces]
  mutations:
    - patchStrategicMerge:
        metadata:
          labels:
            pod-security.kubernetes.io/enforce: "baseline"
            pod-security.kubernetes.io/enforce-version: "latest"


# -----------------------------------------------------------------------------
# 4. GeneratingPolicy — Zero-Trust Default Network Policies
# -----------------------------------------------------------------------------
---
apiVersion: policies.kyverno.io/v1
kind: GeneratingPolicy
metadata:
  name: generate-default-deny-netpol
  annotations:
    policies.kyverno.io/title: Generate Default-Deny Network Policy
    policies.kyverno.io/category: Network Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Automatically creates a default-deny NetworkPolicy in every new
      namespace to enforce zero-trust networking.
  labels:
    app.kubernetes.io/part-of: kyverno-falco-policies
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: [CREATE]
        resources: [namespaces]
  generate:
    apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    name: default-deny-all
    namespace: "{{ request.object.metadata.name }}"
    synchronize: true
    data:
      spec:
        podSelector: {}
        policyTypes:
          - Ingress
          - Egress


# -----------------------------------------------------------------------------
# 5. DeletingPolicy — Scheduled Resource Cleanup (Replaces CleanupPolicy)
# -----------------------------------------------------------------------------
---
apiVersion: policies.kyverno.io/v1
kind: DeletingPolicy
metadata:
  name: delete-stale-completed-jobs
  annotations:
    policies.kyverno.io/title: Delete Completed Jobs Older Than 24 Hours
    policies.kyverno.io/category: Garbage Collection & Hygiene
    policies.kyverno.io/severity: low
    policies.kyverno.io/description: >-
      Periodically cleans up succeeded or failed batch Jobs older than 24 hours.
  labels:
    app.kubernetes.io/part-of: kyverno-falco-policies
spec:
  schedule: "0 1 * * *" # Runs daily at 1:00 AM UTC
  matchConstraints:
    resourceRules:
      - apiGroups: ["batch"]
        apiVersions: ["v1"]
        resources: ["jobs"]
  conditions:
    - expression: >-
        has(object.status.completionTime) &&
        time.now().sub(time.parseIso8601(object.status.completionTime)) > duration('24h')


# -----------------------------------------------------------------------------
# 6. ImageValidatingPolicy — Sigstore / Cosign Image Verification
# -----------------------------------------------------------------------------
---
apiVersion: policies.kyverno.io/v1
kind: ImageValidatingPolicy
metadata:
  name: verify-image-signatures
  annotations:
    policies.kyverno.io/title: Verify Container Image Signatures
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: critical
    policies.kyverno.io/description: >-
      Verifies that container images are signed using Sigstore Cosign keyless or public key.
  labels:
    app.kubernetes.io/part-of: kyverno-falco-policies
spec:
  validationActions:
    - Audit
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: [CREATE, UPDATE]
        resources: [pods]
  rules:
    - name: verify-signature
      imageReferences:
        - "ghcr.io/falcosecurity/*"
        - "*.dkr.ecr.*.amazonaws.com/*"
      attestations:
        - predicateType: https://cosign.sigstore.dev/attestation/v1
