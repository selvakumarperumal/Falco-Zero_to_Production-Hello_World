---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: platform-baseline
    app.kubernetes.io/component: policy-engine
  finalizers:
    - resources-finalizer.argocd.argoproj.io/background
spec:
  project: {{ .Values.kyverno.project }}
  source:
    repoURL: https://kyverno.github.io/kyverno/
    chart: kyverno
    targetRevision: {{ .Values.kyverno.chart_version }}
    helm:
      values: |
        replicaCount: 3
        admissionController:
          replicas: 3
        backgroundController:
          replicas: 2
        cleanupController:
          replicas: 2
        reportsController:
          replicas: 2
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.kyverno.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
