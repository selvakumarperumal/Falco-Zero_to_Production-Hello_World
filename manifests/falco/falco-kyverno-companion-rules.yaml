# =============================================================================
# Falco Companion Rules — Runtime Detection for Kyverno Policies
# =============================================================================
# Built against official Falco Rules Engine Documentation:
#  - Default Macros:    https://falco.org/docs/reference/rules/default-macros/
#  - Macro Overrides:   https://falco.org/docs/reference/rules/macros-override/
#  - Supported Events:  https://falco.org/docs/reference/rules/supported-events/
#  - Supported Fields:  https://falco.org/docs/reference/rules/supported-fields/
#  - Rule Structure:    https://falco.org/docs/reference/rules/examples/
#  - Default Ruleset:   https://falco.org/docs/reference/rules/default-rules/
#
# Together, Kyverno (prevention) + Falco (detection) = defense in depth.
#
# Documentation: docs/kyverno-falco-guide.md
# Companion Kyverno policies: manifests/kyverno/kyverno-policies.yaml
# =============================================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: falco-custom-rules
  namespace: falco
  labels:
    app.kubernetes.io/part-of: falco
    app.kubernetes.io/component: custom-rules
data:
  # -------------------------------------------------------------------------
  # Hello-World Application Runtime Rules
  # -------------------------------------------------------------------------
  hello-world-rules.yaml: |-
    - rule: Unexpected Shell in Hello World Pod
      desc: Detects an interactive shell spawned inside the hello-world workload pod.
      source: syscall
      condition: >
        evt.type = execve and
        container and
        k8s.pod.name startswith "hello-world" and
        proc.name in (bash, sh, zsh)
      output: >
        Shell spawned in hello-world pod (user=%user.name command=%proc.cmdline
        pod=%k8s.pod.name container=%container.id image=%container.image.repository)
      priority: WARNING
      tags: [demo, shell, mitre_execution]

  # -------------------------------------------------------------------------
  # Kyverno Companion Rules — Custom Rules & Macro Overrides
  # -------------------------------------------------------------------------
  kyverno-companion-rules.yaml: |-
    # =======================================================================
    # 0. Standard Macros (Falco v0.44+ — defined locally for standalone use)
    #    These mirror the default Falco ruleset macros. If you load
    #    falco_rules.yaml alongside this file, duplicates are harmless.
    #    Ref: https://falco.org/docs/reference/rules/default-macros/
    # =======================================================================

    - macro: spawned_process
      condition: (evt.type in (execve, execveat) and evt.failed = false)

    - macro: container
      condition: (container.id != host)

    - macro: container_started
      condition: (spawned_process and container and proc.vpid = 1)

    - macro: never_true
      condition: (evt.num = 0)

    # =======================================================================
    # 1. Custom Lists — Appended to Default Falco Ruleset
    # =======================================================================

    - list: approved_registries
      items:
        - dkr.ecr
        - ghcr.io
        - gcr.io
        - registry.k8s.io
        - docker.io

    - list: sensitive_host_paths
      items:
        - /etc/shadow
        - /etc/kubernetes
        - /var/run/docker.sock
        - /var/run/containerd
        - /root/.ssh
        - /root/.kube

    - list: crypto_mining_processes
      items:
        - xmrig
        - minerd
        - minergate
        - cpuminer
        - ethminer
        - cgminer
        - bfgminer
        - nbminer
        - t-rex
        - gminer
        - lolminer

    - list: crypto_mining_pools
      items:
        - pool.minergate.com
        - xmr.pool.minergate.com
        - monerohash.com
        - minexmr.com
        - nanopool.org
        - hashvault.pro
        - supportxmr.com
        - gulf.moneroocean.stream

    # =======================================================================
    # 2. Macro Overrides (using append: true)
    # =======================================================================

    - macro: user_known_untrusted_registries
      append: true
      condition: >
        or (container and not container.image.repository in (approved_registries))

    # =======================================================================
    # 3. Security Rules
    # =======================================================================

    # --- Rule 1: Privileged Container Started ---
    - rule: Privileged Container Started
      desc: Detects a container spawned with host privileged mode enabled.
      source: syscall
      condition: >
        evt.type = execve and
        container and container.privileged = true
      output: >
        Privileged container started (user=%user.name pod=%k8s.pod.name
        ns=%k8s.ns.name image=%container.image.repository)
      priority: CRITICAL
      tags: [kyverno_companion, privileged, mitre_privilege_escalation]

    # --- Rule 2: Container Using Host Namespace ---
    - rule: Container Using Host Namespace
      desc: Detects a container sharing host PID or network namespaces.
      source: syscall
      condition: >
        evt.type = execve and
        container and
        (evt.arg.flags contains "CLONE_NEWPID" or evt.arg.flags contains "CLONE_NEWNET")
      output: >
        Container using host namespace (user=%user.name pod=%k8s.pod.name
        ns=%k8s.ns.name image=%container.image.repository)
      priority: CRITICAL
      tags: [kyverno_companion, host_namespace, mitre_privilege_escalation]

    # --- Rule 3: Container Running as Root User ---
    - rule: Container Running as Root User
      desc: Detects a process spawned with UID 0 (root) inside an application container.
      source: syscall
      condition: >
        evt.type = execve and
        container and user.uid = 0 and
        not k8s.ns.name in (kube-system, kyverno, falco)
      output: >
        Process running as root in container (user=%user.name uid=%user.uid
        command=%proc.cmdline pod=%k8s.pod.name ns=%k8s.ns.name)
      priority: WARNING
      tags: [kyverno_companion, root_user, mitre_privilege_escalation]

    # --- Rule 4: Container from Untrusted Registry ---
    - rule: Container from Untrusted Registry
      desc: Detects a running container whose image originates from an unapproved registry.
      source: syscall
      condition: >
        evt.type = execve and
        container and
        not (container.image.repository contains "dkr.ecr" or
             container.image.repository startswith "ghcr.io/" or
             container.image.repository startswith "gcr.io/" or
             container.image.repository startswith "registry.k8s.io/")
      output: >
        Container from untrusted registry (image=%container.image.repository:%container.image.tag
        pod=%k8s.pod.name ns=%k8s.ns.name)
      priority: ERROR
      tags: [kyverno_companion, supply_chain, mitre_initial_access]

    # --- Rule 5: Container Running with Latest Tag ---
    - rule: Container Running with Latest Tag
      desc: Detects a container executed using unpinned :latest tag.
      source: syscall
      condition: >
        evt.type = execve and
        container and
        (container.image.tag = "latest" or container.image.tag = "")
      output: >
        Container running with :latest tag (image=%container.image.repository:%container.image.tag
        pod=%k8s.pod.name ns=%k8s.ns.name)
      priority: NOTICE
      tags: [kyverno_companion, latest_tag, supply_chain]

    # --- Rule 6: Sensitive Host Path Accessed from Container ---
    - rule: Sensitive Host Path Accessed from Container
      desc: Detects file open events targeting sensitive host filesystem paths.
      source: syscall
      condition: >
        evt.type in (open, openat, openat2) and
        container and
        fd.name in (sensitive_host_paths)
      output: >
        Sensitive host path accessed from container (file=%fd.name
        command=%proc.cmdline pod=%k8s.pod.name ns=%k8s.ns.name)
      priority: CRITICAL
      tags: [kyverno_companion, hostpath, mitre_credential_access]

    # --- Rule 7: Service Account Token Accessed in Container ---
    - rule: Service Account Token Accessed in Container
      desc: Detects process access to auto-mounted service account tokens.
      source: syscall
      condition: >
        evt.type in (open, openat, openat2) and
        container and evt.is_open_read = true and
        fd.name contains "/var/run/secrets/kubernetes.io/serviceaccount" and
        not k8s.ns.name in (kube-system, kyverno, falco)
      output: >
        Service account token accessed (file=%fd.name command=%proc.cmdline
        pod=%k8s.pod.name ns=%k8s.ns.name user=%user.name)
      priority: WARNING
      tags: [kyverno_companion, sa_token, mitre_credential_access]

    # --- Rule 8: Interactive Shell Spawned in Container ---
    - rule: Interactive Shell Spawned in Container
      desc: Detects interactive shell invocation inside a running container.
      source: syscall
      condition: >
        evt.type = execve and
        container and proc.name in (bash, sh, zsh, ksh, csh, fish, dash) and
        proc.tty != 0 and
        not k8s.ns.name in (kube-system, kyverno, falco)
      output: >
        Interactive shell spawned in container (user=%user.name shell=%proc.name
        command=%proc.cmdline pod=%k8s.pod.name ns=%k8s.ns.name image=%container.image.repository)
      priority: WARNING
      tags: [runtime_only, shell, mitre_execution]

    # --- Rule 9: Crypto Mining Process Detected ---
    - rule: Crypto Mining Process Detected
      desc: Detects execution of known cryptocurrency miners or stratum pool traffic.
      source: syscall
      condition: >
        evt.type = execve and
        container and
        (proc.name in (crypto_mining_processes) or
         proc.cmdline contains "stratum+tcp://" or
         proc.cmdline contains "stratum+ssl://")
      output: >
        Crypto mining process detected (command=%proc.cmdline pod=%k8s.pod.name
        ns=%k8s.ns.name image=%container.image.repository user=%user.name)
      priority: CRITICAL
      tags: [runtime_only, crypto_mining, mitre_resource_hijacking]
