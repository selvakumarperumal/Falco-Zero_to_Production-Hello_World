---
# Root App of Apps — ArgoCD renders the platform-baseline Helm chart
# and creates child Applications (falco, reloader)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-baseline
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: platform-baseline
    app.kubernetes.io/component: root
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/selvakumarperumal/Falco-Zero_to_Production-Hello_World.git
    targetRevision: main
    path: manifests/platform_baseline
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

---
# Falco Custom Rules — syncs ConfigMap from manifests/falco/
# Push rule changes to Git → ArgoCD auto-applies them
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco-custom-rules
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: falco
    app.kubernetes.io/component: custom-rules
spec:
  project: default
  source:
    repoURL: https://github.com/selvakumarperumal/Falco-Zero_to_Production-Hello_World.git
    targetRevision: main
    path: manifests/falco
  destination:
    server: https://kubernetes.default.svc
    namespace: falco
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
